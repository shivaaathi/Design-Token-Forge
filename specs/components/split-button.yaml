  accessibility:
    - { name: "--split-btn-focus-outline-width",  default: "2px" }
    - { name: "--split-btn-focus-outline-color",  default: "var(--primary-component-outline-default)" }
    - { name: "--split-btn-focus-outline-offset",  default: "2px" }
    - { name: "--split-btn-min-tap-target",        default: "44px" }
    - { name: "--split-btn-radius-rounded",        default: "var(--radius-full)" }
    total: 5

