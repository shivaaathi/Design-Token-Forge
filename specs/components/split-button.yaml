  # ────────────────────────────────────────────────────────────
  slots:
    icon:
      - name: "--split-btn-icon-size-{size}"
        description: "Icon size in action zone and chevron size in trigger zone"
        per_size:
          micro: "var(--spacing-10)"
          tiny: "var(--spacing-12)"
          small: "var(--spacing-13)"
          base: "var(--spacing-16)"
          medium: "var(--spacing-16)"
          large: "var(--spacing-18)"
          big: "var(--spacing-18)"
          huge: "var(--spacing-20)"
          mega: "var(--spacing-24)"
          ultra: "var(--spacing-28)"
        count: 10

      - name: "--split-btn-icon-color"
        default: "currentColor"
        count: 1

      - name: "--split-btn-icon-color-hover"
        default: "currentColor"
        count: 1

    total: 12

  # ────────────────────────────────────────────────────────────
  # ⚡ MOTION  (5 variables)
  # ────────────────────────────────────────────────────────────
  motion:
    - { name: "--split-btn-transition-property",  default: "background-color, border-color, color, box-shadow, opacity" }
    - { name: "--split-btn-transition-duration",  default: "var(--duration-normal)" }
    - { name: "--split-btn-transition-easing",    default: "var(--easing-in-out)" }
    - { name: "--split-btn-animation-enter",      default: "none" }
    - { name: "--split-btn-animation-exit",       default: "none" }
