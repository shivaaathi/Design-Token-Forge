<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: Inter, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #666; font-size: 13px; }
  .loader { text-align: center; }
  .spinner { width: 24px; height: 24px; border: 3px solid #eee; border-top-color: #666; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #DC2626; display: none; margin-top: 12px; font-size: 11px; max-width: 360px; }
</style>
</head>
<body>
<div class="loader">
  <div class="spinner"></div>
  <div>Loading plugin…</div>
  <div class="error" id="err"></div>
</div>
<script>
(function() {
  var REMOTE = 'https://sridhar-ravi-2917.github.io/Design-Token-Forge/demo/plugin/ui.html';
  fetch(REMOTE + '?_v=' + Date.now())
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(html) {
      document.open();
      document.write(html);
      document.close();
    })
    .catch(function(e) {
      document.getElementById('err').style.display = 'block';
      document.getElementById('err').textContent = 'Could not load remote UI: ' + e.message + '. Check your internet connection.';
    });
})();
</script>
</body>
</html>
